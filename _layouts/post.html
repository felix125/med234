---
layout: default
---

<article class="prose container mx-auto">
    <h1>{{ page.title }}</h1>

    <div class="text-gray-600 -mt-4">
    {% if page.author %}
      <span class="font-bold">{{ site.data.locales[page.lang].author }}：</span>
      <span class="italic">{{ page.author }}</span>
    {% endif %}
      <br />
    {% if page.date %}
      <span class="font-bold">{{ site.data.locales[page.lang].date }}：</span>
      <span class="italic">{{ page.date | date: "%Y-%m-%d" }}</span>
    {% endif %}
  </div>
  <div>
    {{ content }}
  </div>
</article>
